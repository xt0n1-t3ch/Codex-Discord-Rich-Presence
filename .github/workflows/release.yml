name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            os_name: macos
            arch: x64
          - os: macos-14
            target: aarch64-apple-darwin
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: codex-discord-presence-release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN_SRC=codex-discord-presence
          BIN_OUT=codex-discord-rich-presence
          OS_NAME="${{ matrix.os_name }}"
          ARCH="${{ matrix.arch }}"
          OUT_DIR="releases/${OS_NAME}"
          if [ "${OS_NAME}" = "macos" ]; then
            BIN_OUT="${BIN_OUT}-${ARCH}"
          fi
          mkdir -p "${OUT_DIR}"
          cp "target/${{ matrix.target }}/release/${BIN_SRC}" "${OUT_DIR}/${BIN_OUT}"
          chmod +x "${OUT_DIR}/${BIN_OUT}"
          cp "assets/branding/codex-app.png" "${OUT_DIR}/codex-app.png"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN = "codex-discord-presence.exe"
          $OS_NAME = "${{ matrix.os_name }}"
          $OUT_DIR = "releases/$OS_NAME"
          New-Item -ItemType Directory -Force -Path $OUT_DIR | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$BIN" "$OUT_DIR/codex-discord-rich-presence.exe" -Force
          Copy-Item "assets/branding/codex-app.png" "$OUT_DIR/codex-app.png" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: releases/**

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Derive release metadata
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Codex Discord Rich Presence ${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
            echo "TRACK=stable" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=dev-${SHORT_SHA}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Codex Discord Rich Presence Dev ${SHORT_SHA}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
            echo "TRACK=continuous" >> "$GITHUB_ENV"
          fi

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find releases -type f -maxdepth 10 \( -name "codex-discord-rich-presence*" -o -name "codex-app.png" \) -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Generate detailed release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Codex Discord Rich Presence"
            echo
            echo "Track: ${TRACK}"
            echo "Commit: ${GITHUB_SHA}"
            echo
            echo "## Implemented Changes"
            git log -n 15 --pretty='- %s (%h)'
            echo
            echo "## Files Touched In This Commit"
            git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" | sed 's/^/- /'
            echo
            echo "## Release Artifacts"
            echo "- Windows: codex-discord-rich-presence.exe"
            echo "- Linux: codex-discord-rich-presence"
            echo "- macOS x64: codex-discord-rich-presence-x64"
            echo "- macOS arm64: codex-discord-rich-presence-arm64"
          } > RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ env.IS_PRERELEASE }}
          files: release-assets/*
          generate_release_notes: true
