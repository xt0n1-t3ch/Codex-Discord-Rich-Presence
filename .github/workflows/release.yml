name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: .build/target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            os_name: macos
            arch: x64
          - os: macos-14
            target: aarch64-apple-darwin
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: codex-discord-presence-release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN_SRC=codex-discord-presence
          BIN_OUT=codex-discord-rich-presence
          OS_NAME="${{ matrix.os_name }}"
          ARCH="${{ matrix.arch }}"
          OUT_DIR="releases/${OS_NAME}"
          if [ "${OS_NAME}" = "macos" ]; then
            BIN_OUT="${BIN_OUT}-${ARCH}"
          fi
          mkdir -p "${OUT_DIR}"
          cp "${CARGO_TARGET_DIR}/${{ matrix.target }}/release/${BIN_SRC}" "${OUT_DIR}/${BIN_OUT}"
          chmod +x "${OUT_DIR}/${BIN_OUT}"
          cp "assets/branding/codex-app.png" "${OUT_DIR}/codex-app.png"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN = "codex-discord-presence.exe"
          $OS_NAME = "${{ matrix.os_name }}"
          $OUT_DIR = "releases/$OS_NAME"
          New-Item -ItemType Directory -Force -Path $OUT_DIR | Out-Null
          Copy-Item "${env:CARGO_TARGET_DIR}/${{ matrix.target }}/release/$BIN" "$OUT_DIR/codex-discord-rich-presence.exe" -Force
          Copy-Item "assets/branding/codex-app.png" "$OUT_DIR/codex-app.png" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: releases/**

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Derive release metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_LABEL="${VERSION}"
          if [[ "${VERSION}" =~ ^([0-9]+\.[0-9]+)\.0$ ]]; then
            VERSION_LABEL="${BASH_REMATCH[1]}"
          fi
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_LABEL=${VERSION_LABEL}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Codex Discord Rich Presence v${VERSION_LABEL}" >> "$GITHUB_ENV"
          echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          echo "TRACK=stable" >> "$GITHUB_ENV"
          echo "MAKE_LATEST=true" >> "$GITHUB_ENV"

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          WINDOWS_BIN="$(find releases -type f -path '*/windows/codex-discord-rich-presence.exe' | head -n1)"
          LINUX_BIN="$(find releases -type f -path '*/linux/codex-discord-rich-presence' | head -n1)"
          MACOS_X64_BIN="$(find releases -type f -path '*/macos/codex-discord-rich-presence-x64' | head -n1)"
          MACOS_ARM64_BIN="$(find releases -type f -path '*/macos/codex-discord-rich-presence-arm64' | head -n1)"
          APP_LOGO="$(find releases -type f -name 'codex-app.png' | head -n1)"

          test -n "${WINDOWS_BIN}"
          test -n "${LINUX_BIN}"
          test -n "${MACOS_X64_BIN}"
          test -n "${MACOS_ARM64_BIN}"
          test -n "${APP_LOGO}"

          cp "${WINDOWS_BIN}" "release-assets/Codex Discord Rich Presence - Windows x64.exe"
          cp "${LINUX_BIN}" "release-assets/Codex Discord Rich Presence - Linux x64"
          cp "${MACOS_X64_BIN}" "release-assets/Codex Discord Rich Presence - macOS x64"
          cp "${MACOS_ARM64_BIN}" "release-assets/Codex Discord Rich Presence - macOS arm64"
          cp "${APP_LOGO}" "release-assets/Codex Discord Rich Presence - Codex App Logo.png"
          ls -lah release-assets

      - name: Generate detailed release notes
        shell: bash
        run: |
          set -euo pipefail
          CHANGELOG_SECTION="$(awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md)"

          if [[ -z "${CHANGELOG_SECTION//[[:space:]]/}" ]]; then
            CHANGELOG_SECTION=$'### Summary\n\n- See commit history and repository changelog for release details.'
          fi

          {
            echo "# Codex Discord Rich Presence ${VERSION_LABEL}"
            echo
            echo "Stable release for Codex CLI, Codex VS Code Extension, and Codex App."
            echo
            echo "${CHANGELOG_SECTION}"
            echo
            echo "## Release Artifacts"
            echo "- Codex Discord Rich Presence - Windows x64.exe"
            echo "- Codex Discord Rich Presence - Linux x64"
            echo "- Codex Discord Rich Presence - macOS x64"
            echo "- Codex Discord Rich Presence - macOS arm64"
            echo "- Codex Discord Rich Presence - Codex App Logo.png"
          } > RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ env.IS_PRERELEASE }}
          make_latest: ${{ env.MAKE_LATEST }}
          files: release-assets/*
