name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TARGET_DIR: .build/target
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      is_prerelease: ${{ steps.metadata.outputs.is_prerelease }}
      make_latest: ${{ steps.metadata.outputs.make_latest }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: codex-discord-presence-release-preflight

      - name: Validate release metadata
        id: metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: ./scripts/check-release-contract.ps1 -Tag $env:RELEASE_TAG -RefType $env:RELEASE_REF_TYPE

      - name: Release contract tests
        shell: pwsh
        run: |
          ./tests/release_contract.tests.ps1
          ./tests/release_assets.tests.ps1
          ./tests/release_workflow.tests.ps1

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-features --verbose

      - name: Cargo build release
        run: cargo build --workspace --release --all-features

  build:
    name: Build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: .build/target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            os_name: macos
            arch: x64
          - os: macos-14
            target: aarch64-apple-darwin
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x64

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: codex-discord-presence-release-${{ matrix.target }}

      - name: Build target
        run: cargo build --workspace --release --all-features --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          binary_name=codex-discord-rich-presence
          output_directory="releases/${{ matrix.os_name }}"
          if [ "${{ matrix.os_name }}" = "macos" ]; then
            binary_name="${binary_name}-${{ matrix.arch }}"
          fi
          mkdir -p "${output_directory}"
          cp "${CARGO_TARGET_DIR}/${{ matrix.target }}/release/codex-discord-presence" "${output_directory}/${binary_name}"
          chmod +x "${output_directory}/${binary_name}"
          cp assets/branding/codex-app.png "${output_directory}/codex-app.png"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outputDirectory = "releases/${{ matrix.os_name }}"
          New-Item -ItemType Directory -Force -Path $outputDirectory | Out-Null
          Copy-Item "${env:CARGO_TARGET_DIR}/${{ matrix.target }}/release/codex-discord-presence.exe" "$outputDirectory/codex-discord-rich-presence.exe"
          Copy-Item "assets/branding/codex-app.png" "$outputDirectory/codex-app.png"

      - name: Upload target artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: releases/${{ matrix.os_name }}/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.preflight.outputs.tag_name }}
      VERSION: ${{ needs.preflight.outputs.version }}
      RELEASE_NAME: ${{ needs.preflight.outputs.release_name }}
      IS_PRERELEASE: ${{ needs.preflight.outputs.is_prerelease }}
      MAKE_LATEST: ${{ needs.preflight.outputs.make_latest }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download target artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: downloaded-artifacts

      - name: Assemble release assets
        shell: pwsh
        run: ./scripts/release-assets.ps1 -ArtifactRoot downloaded-artifacts -OutputDirectory release-assets

      - name: Verify checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          test -s release-assets/SHA256SUMS.txt
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 6
          cd release-assets
          sha256sum --check SHA256SUMS.txt

      - name: Refuse release mutation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          set +e
          response="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" 2>&1)"
          status=$?
          set -e
          if [ "${status}" -eq 0 ]; then
            echo "Release ${TAG_NAME} already exists; refusing to mutate it." >&2
            exit 1
          fi
          if [[ "${response}" != *"HTTP 404"* ]]; then
            echo "${response}" >&2
            exit 1
          fi

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          changelog_section="$(awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md)"
          test -n "${changelog_section//[[:space:]]/}"

          previous_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          if [ -n "${previous_tag}" ]; then
            full_changelog_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG_NAME}"
          else
            full_changelog_url="https://github.com/${GITHUB_REPOSITORY}/commits/${TAG_NAME}"
          fi
          if [ "${IS_PRERELEASE}" = "true" ]; then
            release_summary="Prerelease for Codex CLI, Codex VS Code Extension, Codex App, and OpenCode-hosted Codex sessions."
          else
            release_summary="Stable release for Codex CLI, Codex VS Code Extension, Codex App, and OpenCode-hosted Codex sessions."
          fi

          {
            echo "# Codex Discord Rich Presence ${VERSION}"
            echo
            echo "${release_summary}"
            echo
            echo "## What Changed"
            echo
            echo "${changelog_section}"
            echo
            echo "## Integrity"
            echo
            echo "Verify every downloaded payload against SHA256SUMS.txt."
            echo
            echo "## Full Changelog"
            echo
            echo "${full_changelog_url}"
          } > RELEASE_NOTES.md

      - name: Create draft and upload release assets
        id: draft-release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: ${{ env.IS_PRERELEASE }}
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft-release.outputs.id }}
        run: |
          set -euo pipefail
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --jq '.draft')" = "true"
          mapfile -t actual_assets < <(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate --jq '.[].name' | sort)
          mapfile -t expected_assets < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          test "${#actual_assets[@]}" -eq 6
          diff <(printf '%s\n' "${expected_assets[@]}") <(printf '%s\n' "${actual_assets[@]}")

          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate \
            --jq '.[] | [.name, .digest] | @tsv' | sort > remote-assets.tsv
          while IFS= read -r local_path; do
            asset_name="$(basename "${local_path}")"
            expected_digest="sha256:$(sha256sum "${local_path}" | cut -d' ' -f1)"
            actual_digest="$(awk -F '\t' -v name="${asset_name}" '$1 == name { print $2 }' remote-assets.tsv)"
            test "${actual_digest}" = "${expected_digest}"
          done < <(find release-assets -maxdepth 1 -type f | sort)

      - name: Finalize release once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft-release.outputs.id }}
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --argjson prerelease "${IS_PRERELEASE}" \
            --arg make_latest "${MAKE_LATEST}" \
            '{draft: false, prerelease: $prerelease, make_latest: $make_latest}')"
          published_release="$(gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --input - <<<"${payload}")"
          test "$(jq -r '.draft' <<<"${published_release}")" = "false"
          test "$(jq -r '.prerelease' <<<"${published_release}")" = "${IS_PRERELEASE}"
          test "$(jq -r '.immutable' <<<"${published_release}")" = "true"
          jq '{id, tag_name, draft, prerelease, immutable}' <<<"${published_release}"
