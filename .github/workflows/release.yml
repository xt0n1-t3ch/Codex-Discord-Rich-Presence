name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TARGET_DIR: .build/target
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      is_prerelease: ${{ steps.metadata.outputs.is_prerelease }}
      make_latest: ${{ steps.metadata.outputs.make_latest }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: codex-discord-presence-release-preflight

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: RustSec audit
        run: cargo audit --deny warnings

      - name: Validate release metadata
        id: metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: ./scripts/check-release-contract.ps1 -Tag $env:RELEASE_TAG -RefType $env:RELEASE_REF_TYPE -ReleaseNotesPath RELEASE_NOTES.md -RepositorySlug $env:GITHUB_REPOSITORY

      - name: Release contract tests
        shell: pwsh
        run: |
          ./tests/release_contract.tests.ps1
          ./tests/release_approval.tests.ps1
          ./tests/release_target.tests.ps1
          ./tests/release_assets.tests.ps1
          ./tests/release_workflow.tests.ps1

      - name: Cargo fmt
        run: cargo --locked fmt --check

      - name: Cargo clippy
        run: cargo --locked clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo --locked test --workspace --all-features --verbose

      - name: Cargo build release
        run: cargo --locked build --workspace --release --all-features

      - name: Upload validated release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: .build/target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            os_name: macos
            arch: x64
          - os: macos-14
            target: aarch64-apple-darwin
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x64

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: codex-discord-presence-release-${{ matrix.target }}

      - name: Build target
        run: cargo --locked build --workspace --release --all-features --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          binary_name="codex-discord-rich-presence-${{ matrix.os_name }}-${{ matrix.arch }}"
          output_directory="releases/${{ matrix.os_name }}"
          mkdir -p "${output_directory}"
          cp "${CARGO_TARGET_DIR}/${{ matrix.target }}/release/codex-discord-presence" "${output_directory}/${binary_name}"
          chmod +x "${output_directory}/${binary_name}"
          cp assets/branding/codex-app.png "${output_directory}/codex-app-logo.png"
          cp assets/branding/chatgpt-app.jpg "${output_directory}/chatgpt-app-logo.jpg"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outputDirectory = "releases/${{ matrix.os_name }}"
          New-Item -ItemType Directory -Force -Path $outputDirectory | Out-Null
          Copy-Item "${env:CARGO_TARGET_DIR}/${{ matrix.target }}/release/codex-discord-presence.exe" "$outputDirectory/codex-discord-rich-presence-windows-x64.exe"
          Copy-Item "assets/branding/codex-app.png" "$outputDirectory/codex-app-logo.png"
          Copy-Item "assets/branding/chatgpt-app.jpg" "$outputDirectory/chatgpt-app-logo.jpg"

      - name: Upload target artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: releases/${{ matrix.os_name }}/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks: read
      contents: write
    env:
      TAG_NAME: ${{ needs.preflight.outputs.tag_name }}
      VERSION: ${{ needs.preflight.outputs.version }}
      RELEASE_NAME: ${{ needs.preflight.outputs.release_name }}
      IS_PRERELEASE: ${{ needs.preflight.outputs.is_prerelease }}
      MAKE_LATEST: ${{ needs.preflight.outputs.make_latest }}
      RELEASE_APPROVED_SHA: ${{ vars.RELEASE_APPROVED_SHA }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download target artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: downloaded-artifacts

      - name: Assemble release assets
        shell: pwsh
        run: ./scripts/release-assets.ps1 -ArtifactRoot downloaded-artifacts -OutputDirectory release-assets

      - name: Verify checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          test -s release-assets/SHA256SUMS.txt
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 7
          cd release-assets
          sha256sum --check SHA256SUMS.txt

      - name: Validate approved release target
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
        run: ./scripts/check-release-target.ps1 -Repository $env:GITHUB_REPOSITORY -Tag $env:TAG_NAME -Version $env:VERSION -Sha $env:RELEASE_SHA -ApprovedSha $env:RELEASE_APPROVED_SHA -IsPrerelease $env:IS_PRERELEASE -MainRef origin/main

      - name: Refuse release mutation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          set +e
          response="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" 2>&1)"
          status=$?
          set -e
          if [ "${status}" -eq 0 ]; then
            echo "Release ${TAG_NAME} already exists; refusing to mutate it." >&2
            exit 1
          fi
          if [[ "${response}" != *"HTTP 404"* ]]; then
            echo "${response}" >&2
            exit 1
          fi

      - name: Create draft and upload release assets
        id: draft-release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: downloaded-artifacts/release-metadata/RELEASE_NOTES.md
          draft: true
          prerelease: ${{ env.IS_PRERELEASE }}
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft-release.outputs.id }}
        run: |
          set -euo pipefail
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --jq '.draft')" = "true"
          mapfile -t actual_assets < <(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate --jq '.[].name' | sort)
          mapfile -t expected_assets < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          test "${#actual_assets[@]}" -eq 7
          diff <(printf '%s\n' "${expected_assets[@]}") <(printf '%s\n' "${actual_assets[@]}")

          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate \
            --jq '.[] | [.name, .digest] | @tsv' | sort > remote-assets.tsv
          while IFS= read -r local_path; do
            asset_name="$(basename "${local_path}")"
            expected_digest="sha256:$(sha256sum "${local_path}" | cut -d' ' -f1)"
            actual_digest="$(awk -F '\t' -v name="${asset_name}" '$1 == name { print $2 }' remote-assets.tsv)"
            test "${actual_digest}" = "${expected_digest}"
          done < <(find release-assets -maxdepth 1 -type f | sort)

      - name: Finalize release once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft-release.outputs.id }}
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --argjson prerelease "${IS_PRERELEASE}" \
            --arg make_latest "${MAKE_LATEST}" \
            '{draft: false, prerelease: $prerelease, make_latest: $make_latest}')"
          published_release="$(gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --input - <<<"${payload}")"
          test "$(jq -r '.draft' <<<"${published_release}")" = "false"
          test "$(jq -r '.prerelease' <<<"${published_release}")" = "${IS_PRERELEASE}"
          test "$(jq -r '.immutable' <<<"${published_release}")" = "true"
          jq '{id, tag_name, draft, prerelease, immutable}' <<<"${published_release}"
